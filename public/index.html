<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker Supreme Art</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeece7;
    --text: #1a1a18; --text2: #6b6960; --text3: #9e9c94;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --blue-bg: #E6F1FB; --blue-text: #0C447C; --blue-border: #85B7EB;
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
    --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #F09595;
    --amber-bg: #FAEEDA; --amber-text: #633806; --amber-border: #EF9F27;
    --radius: 10px; --radius-sm: 7px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; position: sticky; top: 0; z-index: 50; }
  .topbar-brand { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .topbar-brand span { color: var(--blue-text); }
  .topbar-sub { font-size: 12px; color: var(--text2); }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .mode-switch { display: flex; gap: 4px; margin-left: 1rem; background: var(--bg2); padding: 3px; border-radius: var(--radius-sm); }
  .mode-btn { padding: 6px 14px; font-size: 13px; border: none; border-radius: 4px; cursor: pointer; background: transparent; color: var(--text2); font-family: var(--font); font-weight: 500; transition: all 0.12s; }
  .mode-btn.active { background: var(--bg); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .mode-btn:hover:not(.active) { color: var(--text); }
  .inventory-list { display: flex; flex-direction: column; gap: 8px; }
  .inv-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 16px; border-left: 4px solid var(--border); }
  .inv-card.low { border-left-color: #d97706; }
  .inv-card.out { border-left-color: #A32D2D; }
  .inv-main { flex: 1; }
  .inv-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .inv-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .inv-balance { text-align: right; }
  .inv-balance-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
  .inv-balance-unit { font-size: 11px; color: var(--text2); text-transform: uppercase; }
  .inv-badge { display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 600; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 8px; }
  .inv-badge.low { background: #fef3c7; color: #92400e; }
  .inv-badge.out { background: #fee2e2; color: #991b1b; }
  .inv-actions { display: flex; gap: 6px; }
  .ledger-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ledger-table th, .ledger-table td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  .ledger-table th { background: var(--bg2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text2); }
  .ledger-pos { color: #166534; font-weight: 600; }
  .ledger-neg { color: #A32D2D; font-weight: 600; }
  .paper-pick { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .paper-pick select { flex: 1; min-width: 240px; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: var(--font); }
  .stock-hint { font-size: 12px; color: var(--text2); }
  .stock-hint.low { color: #d97706; font-weight: 600; }
  .stock-hint.out { color: #A32D2D; font-weight: 600; }
  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .stat-value { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-value.warn { color: #A32D2D; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 14px; font-size: 13px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.12s; font-family: var(--font); }
  .tab.active { background: var(--text); color: white; border-color: var(--text); }
  .tab:hover:not(.active) { background: var(--bg2); color: var(--text); }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap input { width: 100%; padding: 7px 30px 7px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--font); }
  .search-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; line-height: 1; }
  select.filter { padding: 7px 32px 7px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--font); min-width: 160px; }
  #date-filter { min-width: 170px; margin-left: auto; }
  #date-custom { margin-left: 8px; }
  .btn { padding: 7px 16px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); color: var(--text); font-family: var(--font); transition: all 0.12s; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: white; border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 4px 11px; font-size: 12px; }
  .btn-danger { color: #A32D2D; border-color: var(--red-border); }
  .btn-danger:hover { background: var(--red-bg); }
  .jobs-list { display: flex; flex-direction: column; gap: 8px; }
  .job-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; border-left: 4px solid var(--border); transition: box-shadow 0.12s; }
  .job-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .job-card.p-high { border-left-color: #E24B4A; }
  .job-card.p-medium { border-left-color: #EF9F27; }
  .job-card.p-low { border-left-color: #97C459; }
  .job-card.is-done { opacity: 0.72; }
  .job-top { display: flex; align-items: flex-start; gap: 12px; }
  .job-meta { flex: 1; }
  .job-id-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .job-id { font-size: 12px; font-weight: 600; color: var(--text2); }
  .job-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .job-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .job-actions { display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .badge-active { background: var(--blue-bg); color: var(--blue-text); }
  .badge-done { background: var(--green-bg); color: var(--green-text); }
  .badge-blocked { background: var(--red-bg); color: var(--red-text); }
  .badge-new { background: var(--amber-bg); color: var(--amber-text); }
  .pipeline { display: flex; align-items: center; gap: 3px; margin-top: 10px; flex-wrap: wrap; }
  .stage-pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid; white-space: nowrap; font-weight: 500; }
  .s-done { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .s-active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .s-pending { background: var(--bg2); color: var(--text3); border-color: var(--border); }
  .s-blocked { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .arrow { font-size: 10px; color: var(--text3); }
  .job-notes { font-size: 12px; color: var(--text2); margin-top: 6px; font-style: italic; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input[type=text], input[type=date], input[type=number], select.form-select, textarea.form-ta { width: 100%; padding: 8px 11px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: var(--font); }
  textarea.form-ta { min-height: 65px; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 7px; margin: 8px 0; }
  .sec-btn { padding: 10px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); text-align: center; font-size: 12px; font-weight: 500; color: var(--text2); transition: all 0.12s; font-family: var(--font); }
  .sec-btn:hover { background: var(--bg2); color: var(--text); }
  .sec-btn.sel { border: 2px solid var(--blue-border); background: var(--blue-bg); color: var(--blue-text); }
  .history-item { font-size: 12px; color: var(--text2); padding: 6px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: start; }
  .history-item:last-child { border-bottom: none; }
  .h-stage { font-weight: 600; color: var(--text); }
  .h-time { font-size: 11px; color: var(--text3); }
  .h-note { color: var(--text2); margin-top: 2px; }
  .notif { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: white; padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .notif.show { opacity: 1; }
  #loading-screen { display:flex; position:fixed; inset:0; background:var(--bg3); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .job-top { flex-direction: column; }
    .job-actions { flex-direction: row; }
    .main { padding: 1rem; }
  }
/* Job card style for the New/Edit form — mirrors paper layout */
.modal-card { max-width: 760px !important; }
.modal-wide { max-width: 880px !important; }
.jc-form { width: 100%; border-collapse: collapse; margin-top: 4px; }
.jc-form td { border: 1px solid #c5c2b6; padding: 5px 8px; vertical-align: top; background: #fdfcf7; }
.jc-form .jc-lbl { display: block; font-size: 9px; color: #777; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; font-weight: 600; }
.jc-form input[type="text"], .jc-form input[type="date"], .jc-form input[type="number"], .jc-form select { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 14px; color: var(--text); padding: 1px 0; }
.jc-form input:focus, .jc-form select:focus { background: #fff7d6; }
.jc-form .jc-coat { padding: 8px 10px !important; }
.jc-form .jc-coat label { display: inline-flex; align-items: center; gap: 5px; margin: 3px 12px 3px 0; font-size: 13px; cursor: pointer; }
/* Particulars table */
.jc-part { width: 100%; border-collapse: collapse; margin-top: -1px; }
.jc-part th, .jc-part td { border: 1px solid #c5c2b6; padding: 4px 6px; vertical-align: middle; background: #fdfcf7; font-size: 12px; }
.jc-part th { background: #f4f1e6; font-weight: 600; text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: #555; }
.jc-part .jc-row-label { font-weight: 600; min-width: 170px; }
.jc-part input[type="text"], .jc-part textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 12px; padding: 1px 0; color: var(--text); resize: vertical; }
.jc-part input[type="text"]:focus, .jc-part textarea:focus { background: #fff7d6; }
.jc-part textarea { min-height: 38px; }
.jc-part .jc-spec-row td { padding: 6px 8px; }
.jc-part .jc-spec-row label { display: inline-flex; align-items: center; gap: 4px; margin: 2px 10px 2px 0; font-size: 12px; cursor: pointer; }
.jc-part .jc-spec-row .jc-brand { display: inline-flex; align-items: center; gap: 4px; margin-left: 4px; }
.jc-part .jc-spec-row .jc-brand input { width: 120px; border-bottom: 1px solid #888; }
.jc-title { text-align: center; font-size: 18px; font-weight: 700; letter-spacing: 3px; margin: 4px 0 0; color: var(--text); }
.jc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; position: relative; z-index: 1; }
.jc-header .jc-serial { font-family: 'Courier New', monospace; font-size: 15px; font-weight: 700; color: var(--text); padding-top: 8px; letter-spacing: 1px; }
.jc-header img { height: 40px; width: auto; }
.modal-card { position: relative; }
.jc-watermark-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; opacity: 0.05; pointer-events: none; z-index: 0; }
.jc-extras { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px dashed var(--border); }
.jc-extras .form-label { font-size: 11px; }

/* Print job card — A4 portrait, matches paper layout */
#print-area { display: none; }
@media print {
  html, body { margin: 0; padding: 0; background: #fff; height: auto; }
  body > *:not(#print-area) { display: none !important; }
  #print-area {
    display: block !important; position: relative; width: 210mm; min-height: 0;
    padding: 8mm 10mm; box-sizing: border-box; font-family: Arial, sans-serif; color: #000;
    print-color-adjust: exact; -webkit-print-color-adjust: exact;
  }
  #print-area table, #print-area tr { page-break-inside: avoid; break-inside: avoid; }
  @page { size: A4 portrait; margin: 0; }
}
.pc-logo { height: 60px; width: auto; }
.pc-watermark {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 85%; opacity: 0.08; z-index: 0; pointer-events: none;
  print-color-adjust: exact; -webkit-print-color-adjust: exact;
}
.pc-content { position: relative; z-index: 1; }
.pc-table { width: 100%; border-collapse: collapse; font-size: 12pt; table-layout: fixed; }
.pc-table td { border: 1px solid #000; padding: 6px 8px 8px; vertical-align: top; }
.pc-label { font-size: 9pt; color: #000; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.2; }
.pc-value { font-weight: 600; min-height: 20px; line-height: 1.3; font-size: 12pt; }
.pc-title { text-align: center; font-size: 24pt; font-weight: 700; letter-spacing: 5px; margin: 4px 0 4px; }
.pc-serial { text-align: right; font-size: 13pt; font-family: 'Courier New', monospace; }
.pc-coat-row td { text-align: center; }
.pc-coat-box { display: inline-block; border: 1px solid #000; width: 14px; height: 14px; vertical-align: middle; margin-right: 5px; text-align: center; line-height: 14px; font-size: 10pt; }
.pc-sig { margin-top: 14px; text-align: right; font-size: 11pt; }
.pp-table { width: 100%; border-collapse: collapse; font-size: 11pt; margin-top: -1px; table-layout: fixed; }
.pp-table th, .pp-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; height: 28px; }
.pp-table th { background: #eee; font-weight: 600; text-align: center; font-size: 9.5pt; text-transform: uppercase; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.pp-table .pp-row-label { font-weight: 600; width: 28%; font-size: 11pt; }
.pp-table .pp-spec { font-size: 10.5pt; padding: 7px 8px; }
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size:16px;font-weight:600;color:var(--text);">Job Tracker Supreme Art</div>
  <div style="font-size:13px;color:var(--text2);">Loading jobs...</div>
</div>

<div class="topbar">
  <div>
    <div class="topbar-brand">Job Tracker <span>Supreme Art</span></div>
    <div class="topbar-sub">Packaging Press · Job Tracker</div>
  </div>
  <div class="mode-switch" id="mode-switch">
    <button class="mode-btn active" data-mode="jobs" onclick="setMode('jobs')">Jobs</button>
    <button class="mode-btn" data-mode="inventory" onclick="setMode('inventory')">Inventory</button>
  </div>
  <div class="topbar-right">
    <span id="save-indicator" style="font-size:12px;color:var(--text2);opacity:0;transition:opacity 0.2s;">Saving...</span>
    <button class="btn btn-sm" id="topbar-refresh" onclick="refreshCurrent()">&#8635; Refresh</button>
    <button class="btn btn-sm" id="topbar-export" onclick="exportCSV()">Export to Excel</button>
    <button class="btn btn-primary" id="topbar-add" onclick="openAdd()">+ New Job</button>
  </div>
</div>

<div class="main" id="jobs-mode">
  <div class="stats-row" id="stats-row"></div>
  <div class="toolbar">
    <div class="tabs" id="tabs-wrap"></div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search job, client, or ID..." oninput="setFilter(this.value)">
      <span class="search-icon">&#128269;</span>
    </div>
    <select class="filter" id="stage-filter" onchange="setStageFilter(this.value)">
      <option value="">All stages</option>
    </select>
    <select class="filter" id="client-filter" onchange="setClientFilter(this.value)">
      <option value="">All companies</option>
    </select>
    <select class="filter" id="date-filter" onchange="setDateRange(this.value)">
      <option value="">All time</option>
      <option value="this-week">This week</option>
      <option value="last-week">Last week</option>
      <option value="past-7">Past 7 days</option>
      <option value="this-month">This month</option>
      <option value="last-month">Last month</option>
      <option value="past-30">Past 30 days</option>
      <option value="this-year">This year</option>
      <option value="last-year">Last year</option>
      <option value="custom">Custom range…</option>
    </select>
    <span id="date-custom" style="display:none;gap:6px;align-items:center;">
      <input type="date" id="date-from" class="filter" onchange="setDateCustom()" style="padding:6px;">
      <span style="color:var(--text2);font-size:12px;">to</span>
      <input type="date" id="date-to" class="filter" onchange="setDateCustom()" style="padding:6px;">
    </span>
  </div>
  <div class="jobs-list" id="jobs-list"></div>
</div>

<div class="main" id="inventory-mode" style="display:none;">
  <div class="stats-row" id="inv-stats-row"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="inv-search-input" placeholder="Search paper type, brand..." oninput="setInvFilter(this.value)">
      <span class="search-icon">&#128269;</span>
    </div>
    <select class="filter" id="inv-type-filter" onchange="setInvTypeFilter(this.value)">
      <option value="">All paper types</option>
    </select>
    <select class="filter" id="inv-stock-filter" onchange="setInvStockFilter(this.value)">
      <option value="">All stock levels</option>
      <option value="low">Low stock only</option>
      <option value="out">Out of stock</option>
    </select>
  </div>
  <div class="inventory-list" id="inventory-list"></div>
</div>

<div id="modal-root"></div>
<div id="print-area"></div>
<div class="notif" id="notif"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const STAGES = ['CTP Plate Making','Printing','Coatings','Die Cutting','Breaking','Pasting','Storage / Ready','Delivered'];
const SHORT  = ['CTP','Print','Coat','Die Cut','Break','Paste','Storage','Delivered'];
const PAPERS  = ['Bleach Card','Box Board','Art Card','Art Paper','Offset Paper','Half White Paper'];
const MACHINES = ['SORM-Z','SORM','SM-74','CD-102','GTO','SM-52'];
const COATING_OPTS = ['UV','Spot UV','Varnish','Lacquer','Water Base','Lamination','Emboss','Color Seal','Dripup','Cylinder Emboss','Hot Foiling'];
// Coatings printed on the physical job card, in paper-card order (two rows)
const PRINT_COATINGS_ROW1 = ['UV','Spot UV','Varnish','Lacquer','Lamination'];
const PRINT_COATINGS_ROW2 = ['Emboss','Color Seal','Dripup','Cylinder Emboss','Hot Foiling'];
const PAPER_TYPES = ['Bleach Card','Box Board','Art Card','Art Paper','Offset Paper','Off-White'];

// Particulars table — every row of the paper card's bottom section.
// 'data' rows have Details/Quantity/Name/Signature inputs.
// Specials handle the multi-checkbox rows that span those 4 columns.
const PARTICULARS_ROWS = [
  { key: 'artworks_matter_approval', label: 'Artworks & Matter Approval' },
  { key: 'shade_card',               label: 'Shade Card' },
  { key: 'plates',                   label: 'Plates' },
  { key: 'no_of_colors',             label: 'No. of Colors' },

// ── Helpers ───────────────────────────────────────────────────
function isDone(j) { return j.stages && j.stages[STAGES.length-1]?.status === 'done'; }
function isBlocked(j) { const si = j.stage_index||0; return j.stages && j.stages[si]?.status === 'blocked'; }
function isStorage(j) { return !isDone(j) && (j.stage_index||0) === STAGES.indexOf('Storage / Ready'); }
function dateRangeBounds(preset) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayMon = today.getDay() === 0 ? 7 : today.getDay(); // Mon=1..Sun=7
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - (dayMon - 1));
  const addDays = (d, n) => { const c = new Date(d); c.setDate(d.getDate() + n); return c; };
  switch (preset) {
    case 'this-week':  return { from: weekStart, to: addDays(weekStart, 7) };
    case 'last-week':  return { from: addDays(weekStart, -7), to: weekStart };
    case 'past-7':     return { from: addDays(today, -6), to: addDays(today, 1) };
    case 'this-month': return { from: new Date(now.getFullYear(), now.getMonth(), 1), to: new Date(now.getFullYear(), now.getMonth()+1, 1) };
    case 'last-month': return { from: new Date(now.getFullYear(), now.getMonth()-1, 1), to: new Date(now.getFullYear(), now.getMonth(), 1) };
    case 'past-30':    return { from: addDays(today, -29), to: addDays(today, 1) };
    case 'this-year':  return { from: new Date(now.getFullYear(), 0, 1), to: new Date(now.getFullYear()+1, 0, 1) };
    case 'last-year':  return { from: new Date(now.getFullYear()-1, 0, 1), to: new Date(now.getFullYear(), 0, 1) };
  }
  return null;
}
function parseLocalDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function inDateRange(j) {
  if (!filterDateRange) return true;
  const issued = parseLocalDate(j.dateissued);
  if (!issued) return false;
  if (filterDateRange === 'custom') {
    const from = parseLocalDate(filterDateFrom);
    const to   = parseLocalDate(filterDateTo);
    if (from && issued < from) return false;
    if (to) { const end = new Date(to); end.setDate(end.getDate() + 1); if (issued >= end) return false; }
    return true;
  }
  const b = dateRangeBounds(filterDateRange);
  return b && issued >= b.from && issued < b.to;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showSaving(on) { document.getElementById('save-indicator').style.opacity = on ? '1' : '0'; }
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── API calls ─────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Request failed'); }
  return res.json();
}

async function loadJobs() {
  try {
    jobs = await api('GET', '/api/jobs');
    render();
  } catch(e) {
    notify('Error loading jobs: ' + e.message);
  }
}

async function loadInventory() {
  try {
    inventory = await api('GET', '/api/inventory');
    if (mode === 'inventory') renderInventory();
  } catch(e) {
    notify('Error loading inventory: ' + e.message);
  }
}

// Mode (top-level page) switching — toggles between Jobs and Inventory views
// and swaps the topbar's primary action button accordingly.
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  document.getElementById('jobs-mode').style.display      = m === 'jobs' ? 'block' : 'none';
  document.getElementById('inventory-mode').style.display = m === 'inventory' ? 'block' : 'none';
  const addBtn = document.getElementById('topbar-add');
  const exportBtn = document.getElementById('topbar-export');
  if (m === 'jobs') {
    addBtn.textContent = '+ New Job';     addBtn.onclick = openAdd;
    exportBtn.style.display = '';
    render();
  } else {
    addBtn.textContent = '+ New Paper';   addBtn.onclick = openInvAdd;
    exportBtn.style.display = 'none';
    renderInventory();
  }
}
function refreshCurrent() { mode === 'jobs' ? loadJobs() : loadInventory(); }

// ── Filtering ─────────────────────────────────────────────────
function getFiltered() {
  return jobs.filter(j => {
    const t = filterText.toLowerCase();
    if (t && !j.name.toLowerCase().includes(t) && !j.client.toLowerCase().includes(t) && !String(j.id).includes(t)) return false;
    if (filterStage && (j.stage_index||0) !== STAGES.indexOf(filterStage)) return false;
    if (filterClient && j.client !== filterClient) return false;
    if (!inDateRange(j)) return false;
    if (view === 'active')  return !isDone(j) && !isStorage(j) && !isBlocked(j);
    if (view === 'storage') return isStorage(j);
    if (view === 'done')    return isDone(j);
    if (view === 'blocked') return isBlocked(j);
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────
function renderStats() {
  const s = {
    total: jobs.length,
    active: jobs.filter(j=>!isDone(j)&&!isBlocked(j)&&!isStorage(j)).length,
    storage: jobs.filter(isStorage).length,
    done: jobs.filter(isDone).length,
    blocked: jobs.filter(isBlocked).length
  };
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-label">Total Jobs</div><div class="stat-value">${s.total}</div></div>
    <div class="stat"><div class="stat-label">In Progress</div><div class="stat-value">${s.active}</div></div>
    <div class="stat"><div class="stat-label">Storage</div><div class="stat-value">${s.storage}</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-value">${s.done}</div></div>
    <div class="stat"><div class="stat-label">Blocked</div><div class="stat-value ${s.blocked>0?'warn':''}">${s.blocked}</div></div>
  `;
}

function renderTabs() {
  const views = [['all','All'],['active','In Progress'],['storage','Storage'],['blocked','Blocked'],['done','Done']];
  document.getElementById('tabs-wrap').innerHTML = views.map(([v,l])=>`<button class="tab ${view===v?'active':''}" onclick="setView('${v}')">${l}</button>`).join('');
  const sf = document.getElementById('stage-filter');
  sf.innerHTML = `<option value="">All stages</option>` + STAGES.map(s=>`<option value="${s}" ${filterStage===s?'selected':''}>${s}</option>`).join('');
  const cf = document.getElementById('client-filter');
  const clients = [...new Set(jobs.map(j=>j.client).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  cf.innerHTML = `<option value="">All companies</option>` + clients.map(c=>`<option value="${esc(c)}" ${filterClient===c?'selected':''}>${esc(c)}</option>`).join('');
}

function renderJobs() {
  const filtered = getFiltered().slice().reverse();
  const el = document.getElementById('jobs-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">${jobs.length===0?'No jobs yet. Click <b>+ New Job</b> to create the first job card.':'No jobs match this filter.'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(j => {
    const si = j.stage_index || 0;
    const done = isDone(j), blocked = isBlocked(j);
    const badge = done ? `<span class="badge badge-done">Delivered</span>` :
      blocked ? `<span class="badge badge-blocked">Blocked</span>` :
      si === 0 && !j.stages?.[0] ? `<span class="badge badge-new">New</span>` :
      `<span class="badge badge-active">Stage ${si+1}/${STAGES.length}</span>`;
    const pipeline = STAGES.map((s,i) => {
      let cls = 's-pending';
      const st = j.stages?.[i]?.status;
      if (st==='done') cls='s-done';
      else if (i===si && !done) cls = blocked ? 's-blocked' : 's-active';
      return `${i>0?'<span class="arrow">›</span>':''}<span class="stage-pill ${cls}" title="Move to ${s}" onclick="moveToStage(${j.id},${i})" style="cursor:pointer">${SHORT[i]}</span>`;
    }).join('');
    const note = j.stages?.[si]?.notes;
    const pc = j.priority==='High'?'p-high':j.priority==='Medium'?'p-medium':'p-low';
    const coatings = Array.isArray(j.coatings) ? j.coatings : [];
    return `
    <div class="job-card ${pc} ${done?'is-done':''}">
      <div class="job-top">
        <div class="job-meta">
          <div class="job-id-row">
            <span class="job-id">#${j.id}</span>
            ${badge}
            ${j.priority==='High'?'<span class="badge badge-blocked" style="font-size:10px;">HIGH PRIORITY</span>':''}
          </div>
          <div class="job-name">${esc(j.name)}</div>
          <div class="job-sub">${esc(j.client)}${j.qty?' &middot; '+esc(j.qty)+' pcs':''}${j.deadline?' &middot; Due: '+esc(j.deadline):''}</div>
          <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;font-size:12px;color:var(--text2);">
            ${j.jobcode?`<span><b style="color:var(--text)">Code:</b> ${esc(j.jobcode)}</span>`:''}
            ${j.dateissued?`<span><b style="color:var(--text)">Issued:</b> ${esc(j.dateissued)}</span>`:''}
            ${j.size?`<span><b style="color:var(--text)">Size/GSM:</b> ${esc(j.size)}</span>`:''}
            ${j.ups?`<span><b style="color:var(--text)">Ups:</b> ${esc(j.ups)}</span>`:''}
            ${j.sheets?`<span><b style="color:var(--text)">Sheets:</b> ${esc(j.sheets)}</span>`:''}
            ${j.paper?`<span><b style="color:var(--text)">Paper:</b> ${esc(j.paper)}</span>`:''}
            ${j.machine?`<span><b style="color:var(--text)">Machine:</b> ${esc(j.machine)}</span>`:''}
            ${coatings.length?`<span><b style="color:var(--text)">Coatings:</b> ${coatings.map(esc).join(', ')}</span>`:''}
            ${j.delqty?`<span><b style="color:var(--text)">Delivered PO:</b> ${esc(j.delqty)}</span>`:''}
            ${j.cartonqty?`<span><b style="color:var(--text)">Unit Carton:</b> ${esc(j.cartonqty)}</span>`:''}
          </div>
          <div class="pipeline">${pipeline}</div>
          ${note?`<div class="job-notes">${esc(note)}</div>`:''}
        </div>
        <div class="job-actions">
          <button class="btn btn-sm btn-primary" onclick="openUpdate(${j.id})">Update</button>
          <button class="btn btn-sm" onclick="openHistory(${j.id})">History</button>
          <button class="btn btn-sm" onclick="openEdit(${j.id})">Edit</button>
          <button class="btn btn-sm" onclick="printJobCard(${j.id})">Print</button>
          ${!done?`<button class="btn btn-sm btn-danger" onclick="toggleBlock(${j.id})">${blocked?'Unblock':'Block'}</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function render() { renderStats(); renderTabs(); renderJobs(); }
function setView(v) { view=v; render(); }
function setFilter(v) { filterText=v; renderJobs(); }
function setStageFilter(v) { filterStage=v; renderJobs(); }
function setClientFilter(v) { filterClient=v; renderJobs(); }
function setInvFilter(v)      { invFilterText  = v; renderInventory(); }
function setInvTypeFilter(v)  { invFilterType  = v; renderInventory(); }
function setInvStockFilter(v) { invFilterStock = v; renderInventory(); }

// ── Inventory rendering ──────────────────────────────────────
function invStockState(item) {
  const bal = item.current_balance || 0;
  const thr = item.reorder_threshold || 0;
  if (bal <= 0) return 'out';
  if (thr > 0 && bal <= thr) return 'low';
  return 'ok';
}
function getInventoryFiltered() {
  return inventory.filter(it => {
    const t = invFilterText.toLowerCase();
    if (t) {
      const hay = `${it.paper_type} ${it.size||''} ${it.gsm||''} ${it.brand||''}`.toLowerCase();
      if (!hay.includes(t)) return false;
    }
    if (invFilterType && it.paper_type !== invFilterType) return false;
    const state = invStockState(it);
    if (invFilterStock === 'low' && state === 'ok') return false;
    if (invFilterStock === 'out' && state !== 'out') return false;
    return true;
  });
}
function renderInventoryStats() {
  const s = {
    total: inventory.length,
    low:   inventory.filter(i => invStockState(i) === 'low').length,
    out:   inventory.filter(i => invStockState(i) === 'out').length,
    sheets: inventory.reduce((a, i) => a + (i.current_balance || 0), 0),
  };
  document.getElementById('inv-stats-row').innerHTML = `
    <div class="stat"><div class="stat-label">Paper Items</div><div class="stat-value">${s.total}</div></div>
    <div class="stat"><div class="stat-label">Total Sheets</div><div class="stat-value">${s.sheets.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Low Stock</div><div class="stat-value ${s.low>0?'warn':''}">${s.low}</div></div>
    <div class="stat"><div class="stat-label">Out of Stock</div><div class="stat-value ${s.out>0?'warn':''}">${s.out}</div></div>
  `;
}
function renderInventoryFilters() {
  const sf = document.getElementById('inv-type-filter');
  const types = [...new Set(inventory.map(i => i.paper_type).filter(Boolean))].sort();
  sf.innerHTML = `<option value="">All paper types</option>` + types.map(t => `<option value="${esc(t)}" ${invFilterType===t?'selected':''}>${esc(t)}</option>`).join('');
}
function renderInventoryList() {
  const filtered = getInventoryFiltered();
  const el = document.getElementById('inventory-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">${inventory.length===0?'No inventory items yet. Click <b>+ New Paper</b> to add the first one.':'No items match this filter.'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(it => {
    const state = invStockState(it);
    const badge = state === 'out' ? '<span class="inv-badge out">Out</span>'
                : state === 'low' ? '<span class="inv-badge low">Low</span>' : '';
    const sub = [it.size, it.gsm ? it.gsm + ' gsm' : '', it.brand].filter(Boolean).map(esc).join(' · ');
    return `
    <div class="inv-card ${state}">
      <div class="inv-main">
        <div class="inv-name">${esc(it.paper_type)}${badge}</div>
        <div class="inv-sub">${sub || '—'}${it.reorder_threshold ? ' · Reorder at ' + it.reorder_threshold.toLocaleString() : ''}</div>
      </div>
      <div class="inv-balance">
        <div class="inv-balance-num">${(it.current_balance||0).toLocaleString()}</div>
        <div class="inv-balance-unit">${esc(it.unit||'sheets')}</div>
      </div>
      <div class="inv-actions">
        <button class="btn btn-sm btn-primary" onclick="openInvAddStock(${it.id})">+ Stock</button>
        <button class="btn btn-sm" onclick="openInvHistory(${it.id})">History</button>
        <button class="btn btn-sm" onclick="openInvEdit(${it.id})">Edit</button>
      </div>
    </div>`;
  }).join('');
}
function renderInventory() {
  renderInventoryStats();
  renderInventoryFilters();
  renderInventoryList();
}

function openInvAdd() {
  openModal(`<div class="modal" onclick="event.stopPropagation()">
    <h2>Add Paper Item</h2>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Paper Type *</label>
        <select id="inv-paper-type">${PAPER_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Brand</label><input type="text" id="inv-brand" placeholder="e.g. Century"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Size</label><input type="text" id="inv-size" placeholder="e.g. 25x36"></div>
      <div class="form-group"><label class="form-label">GSM</label><input type="text" id="inv-gsm" placeholder="e.g. 300"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Opening Balance (sheets)</label><input type="number" id="inv-opening" placeholder="0" min="0"></div>

      <button class="btn btn-primary" onclick="saveInvAdd()">Add Item</button>
    </div>
  </div>`);
}
async function saveInvAdd() {
  const data = {
    paper_type: document.getElementById('inv-paper-type').value,
    size:       document.getElementById('inv-size').value.trim(),
    gsm:        document.getElementById('inv-gsm').value.trim(),
    brand:      document.getElementById('inv-brand').value.trim(),
    reorder_threshold: parseInt(document.getElementById('inv-threshold').value, 10) || 0,
    opening_balance:   parseInt(document.getElementById('inv-opening').value, 10) || 0,
    opening_notes:     document.getElementById('inv-opening-notes').value.trim(),
  };
  if (!data.paper_type) { alert('Paper type is required'); return; }
  showSaving(true);
  try {
    await api('POST', '/api/inventory', data);
    await loadInventory();
    closeModal(); notify('Paper item added');
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

async function saveInvEdit(id) {
  const data = {
    paper_type: document.getElementById('inv-paper-type').value,

    change: qty,
    reason: document.getElementById('stock-reason').value,
    notes:  document.getElementById('stock-notes').value.trim(),
  };
  showSaving(true);
  try {
    await api('POST', `/api/inventory/${id}/transactions`, data);
    await loadInventory();
    closeModal(); notify(`+${qty.toLocaleString()} sheets added`);

async function openInvHistory(id) {
  const it = inventory.find(x => x.id === id); if (!it) return;
  const label = `${it.paper_type}${it.size?' · '+it.size:''}${it.gsm?' · '+it.gsm+'gsm':''}${it.brand?' · '+it.brand:''}`;
  openModal(`<div class="modal modal-wide" onclick="event.stopPropagation()">
    <h2>History · ${esc(label)}</h2>
    <div id="ledger-content" style="font-size:13px;color:var(--text2);">Loading…</div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Close</button></div>
  </div>`);
  try {
    const txs = await api('GET', `/api/inventory/${id}/transactions`);
    const rows = txs.map(t => {
      const date = new Date(t.created_at).toLocaleString('en-PK');
      const cls  = t.change > 0 ? 'ledger-pos' : 'ledger-neg';
      const sign = t.change > 0 ? '+' : '';
      const job  = t.job_id ? `Job E-${t.job_id}${t.job_code?' · '+esc(t.job_code):''}` : '—';
      return `<tr>
        <td>${date}</td>
        <td class="${cls}">${sign}${t.change.toLocaleString()}</td>
        <td>${esc(t.reason||'')}</td>
        <td>${job}</td>
        <td>${esc(t.notes||'')}</td>
      </tr>`;
    }).join('');
    document.getElementById('ledger-content').innerHTML = txs.length
      ? `<table class="ledger-table">
           <tr><th>When</th><th>Change</th><th>Reason</th><th>Job</th><th>Notes</th></tr>
           ${rows}
         </table>`
      : '<div class="empty">No transactions yet.</div>';
  } catch(e) {
    document.getElementById('ledger-content').innerHTML = 'Error: ' + e.message;
  }
}

function collectParticulars() {
  const out = {};
  PARTICULARS_ROWS.forEach(r => {
    if (r.type) return;
    const cell = sub => (document.getElementById(`p-${r.key}-${sub}`)||{}).value || '';
    const row = { details: cell('details').trim(), quantity: cell('quantity').trim(), name: cell('name').trim(), signature: cell('signature').trim() };
    if (row.details || row.quantity || row.name || row.signature) out[r.key] = row;
  });
  out.cutting_size_gsm = (document.getElementById('f-cutting-size')||{}).value?.trim() || '';
  out.quantity_of_packets = (document.getElementById('f-packets')||{}).value?.trim() || '';
  out.comments = (document.getElementById('p-comments')||{}).value?.trim() || '';
  return out;
}

// Live "Available: X sheets" hint next to the paper dropdown in the job form.
// Compares against the current Sheets Qty field so we can flag insufficient stock pre-save.
function updateStockHint() {
  const sel = document.getElementById('f-inventory-item');
  const hint = document.getElementById('stock-hint');
  if (!sel || !hint) return;
  if (!sel.value) { hint.textContent = ''; hint.className = 'stock-hint'; return; }
  const balance = parseInt(sel.options[sel.selectedIndex].dataset.balance, 10) || 0;
  const needed = parseInt((document.getElementById('f-sheets')||{}).value, 10) || 0;
  let cls = 'stock-hint';
  if (balance <= 0) cls += ' out';
  else if (needed > balance) cls += ' low';
  hint.className = cls;
  hint.textContent = needed > 0
    ? `Available: ${balance.toLocaleString()} · Need: ${needed.toLocaleString()}${needed > balance ? ' · Short by ' + (needed - balance).toLocaleString() : ''}`
    : `Available: ${balance.toLocaleString()} sheets`;
}

// Pre-save stock check — fires before POST/PUT. Returns true if okay to proceed,
// false if the user chose to cancel after seeing the negative-stock warning.
function checkStockBeforeSave(data) {
  if (!data.inventory_item_id) return true;
  const sheets = parseInt(data.sheets, 10) || 0;
  if (sheets <= 0) return true;
  const item = inventory.find(i => i.id === data.inventory_item_id);
  if (!item) return true;
  if (sheets <= (item.current_balance || 0)) return true;
  const after = (item.current_balance || 0) - sheets;
  return confirm(`Insufficient stock for ${item.paper_type}.\n\nAvailable: ${(item.current_balance||0).toLocaleString()} sheets\nNeeded: ${sheets.toLocaleString()} sheets\nBalance after: ${after.toLocaleString()} sheets\n\nProceed anyway?`);
}

async function saveAdd() {
  const data = getFormData();
  if (!data.name || !data.client) { alert('Job name and client are required.'); return; }
  if (!checkStockBeforeSave(data)) return;
  showSaving(true);
  try {
    const newJob = await api('POST', '/api/jobs', data);
    jobs.push(newJob);
    await loadInventory();   // refresh balances after server-side deduction
    closeModal(); notify('Job created!'); render();
    setTimeout(() => printJobCard(newJob.id), 100);
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

async function saveEdit(id) {
  const data = getFormData();
  if (!data.name || !data.client) { alert('Name and client required.'); return; }
  // Stock warning only fires when the paper item or sheets qty actually changed
  // vs. what's saved on the job — otherwise editing unrelated fields wouldn't ask.
  const prior = jobs.find(j => j.id === id);
  const itemChanged   = prior && prior.inventory_item_id !== data.inventory_item_id;
  const sheetsChanged = prior && (prior.sheets || '') !== data.sheets;
  if ((itemChanged || sheetsChanged) && !checkStockBeforeSave(data)) return;
  showSaving(true);
  try {
    const updated = await api('PUT', `/api/jobs/${id}`, data);
    jobs = jobs.map(j => j.id===id ? {...j,...updated} : j);
    await loadInventory();
    closeModal(); notify('Saved!'); render();
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

async function saveUpdate(id) {
  const j = jobs.find(x=>x.id===id);
  if (!j) return;
  const notes = document.getElementById('u-notes').value.trim();
  const target = STAGES.indexOf(selSection);
  if (target < 0) { alert('Please pick a stage.'); return; }
  const by = STAGES[target];
  const time = new Date().toLocaleString('en-PK');
  const prevSi = j.stage_index || 0;
  const stages = { ...(j.stages||{}) };
  const log = [...(j.log||[])];
  for (let i = 0; i < target; i++) {
    if (!stages[i] || stages[i].status !== 'done') {
      stages[i] = { ...(stages[i]||{}), status: 'done', by, time };
    }
  }
  const status = target === STAGES.length - 1 ? 'done' : 'active';
  stages[target] = { status, notes, by, time };
  for (let i = target + 1; i < STAGES.length; i++) delete stages[i];
  const logNote = notes || (target !== prevSi ? `Moved from ${STAGES[prevSi]}` : 'Stage updated');
  log.push({ stage: STAGES[target], status, notes: logNote, by, time });
  const si = target;
  showSaving(true);
  try {
    const updated = await api('PATCH', `/api/jobs/${id}/stage`, { stage_index: si, stages, log });
    jobs = jobs.map(x => x.id===id ? {...x,...updated} : x);
    closeModal(); notify('Updated!'); render();
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

async function moveToStage(id, target) {
  const j = jobs.find(x=>x.id===id);
  if (!j) return;
  const prevSi = j.stage_index || 0;
  if (target === prevSi) return;
  const time = new Date().toLocaleString('en-PK');
  const by = STAGES[target];
  const stages = { ...(j.stages||{}) };
  const log = [...(j.log||[])];
  for (let i = 0; i < target; i++) {
    if (!stages[i] || stages[i].status !== 'done') {
      stages[i] = { ...(stages[i]||{}), status: 'done', by, time };
    }
  }
  const status = target === STAGES.length - 1 ? 'done' : 'active';
  stages[target] = { status, notes: '', by, time };
  for (let i = target + 1; i < STAGES.length; i++) delete stages[i];
  log.push({ stage: STAGES[target], status, notes: `Moved from ${STAGES[prevSi]}`, by, time });
  showSaving(true);
  try {
    const updated = await api('PATCH', `/api/jobs/${id}/stage`, { stage_index: target, stages, log });
    jobs = jobs.map(x => x.id===id ? {...x,...updated} : x);
    notify(`Moved to ${STAGES[target]}`); render();
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

async function toggleBlock(id) {
  const j = jobs.find(x=>x.id===id);
  if (!j) return;
  const si = j.stage_index || 0;
  const currentlyBlocked = isBlocked(j);
  const action = currentlyBlocked ? 'Unblock' : 'Block';
  const reason = prompt(`${action} this job — add a reason (optional):`, '');
  if (reason === null) return;
  const time = new Date().toLocaleString('en-PK');
  const by = STAGES[si];
  const stages = { ...(j.stages||{}) };
  const log = [...(j.log||[])];
  const newStatus = currentlyBlocked ? 'active' : 'blocked';
  stages[si] = { ...(stages[si]||{}), status: newStatus, notes: reason, by, time };
  log.push({ stage: STAGES[si], status: newStatus, notes: reason || (currentlyBlocked?'Unblocked':'Blocked'), by, time });
  showSaving(true);
  try {
    const updated = await api('PATCH', `/api/jobs/${id}/stage`, { stage_index: si, stages, log });
    jobs = jobs.map(x => x.id===id ? {...x,...updated} : x);
    notify(currentlyBlocked ? 'Unblocked' : 'Blocked'); render();
  } catch(e) { notify('Error: ' + e.message); }
  showSaving(false);
}

function buildPrintCard(j) {
  const v = x => esc(x || '');
  const fmt = d => d ? new Date(d).toLocaleDateString('en-PK') : '';
  const coatings = Array.isArray(j.coatings) ? j.coatings : [];
  const p = j.particulars || {};
  // Paper checkmark sources: prefer the live inventory item the job points to;
  // fall back to the old free-text paper_types array for jobs created before
  // the inventory feature existed.
  const invItem = j.inventory_item_id ? inventory.find(i => i.id === j.inventory_item_id) : null;
  const paperTypes = invItem ? [invItem.paper_type] : (Array.isArray(p.paper_types) ? p.paper_types : []);
  const paperBrand = invItem ? (invItem.brand || '') : (p.brand || '');
  const coatLabel = name => `<span class="pc-coat-box">${coatings.includes(name) ? '✓' : ''}</span>${name === 'Color Seal' ? 'Colour Seal' : name}`;
  const cell = (label, val) => `<td><div class="pc-label">${label}</div><div class="pc-value">${v(val)}</div></td>`;
  const dateCell = (label, val) => `<td><div class="pc-label">${label}</div><div class="pc-value">${fmt(val)}</div></td>`;

  const dataRow = r => `
    <tr>
      <td class="pp-row-label">${r.label}</td>
      <td>${v(p[r.key]?.details)}</td>
      <td>${v(p[r.key]?.quantity)}</td>
      <td>${v(p[r.key]?.name)}</td>
      <td>${v(p[r.key]?.signature)}</td>
    </tr>`;
  const papersRow = `
    <tr><td colspan="5" class="pp-spec">
      ${PAPER_TYPES.map(t => `<span style="margin-right:14px;"><span class="pc-coat-box">${paperTypes.includes(t)?'✓':''}</span>${t}</span>`).join('')}
      <span style="margin-left:6px;">Brand: ${v(paperBrand)}</span>
    </td></tr>`;
  const coatRow = list => `
    <tr><td colspan="5" class="pp-spec" style="text-align:center;">
      ${list.map(c => `<span style="margin:0 12px;">${coatLabel(c)}</span>`).join('')}
    </td></tr>`;
  const specsRows = papersRow + coatRow(PRINT_COATINGS_ROW1) + coatRow(PRINT_COATINGS_ROW2);
  const commentsRow = `
    <tr>
      <td class="pp-row-label">Comments</td>
      <td colspan="4" style="min-height:32px;">${v(p.comments)}</td>
    </tr>`;
  const partRows = PARTICULARS_ROWS.map(dataRow).join('') + commentsRow;

  return `
    <img class="pc-watermark" src="/logo.png" alt="">
    <div class="pc-content">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div class="pc-serial" style="text-align:left;padding-top:8px;">E-${v(j.id)}${j.jobcode ? ' &middot; ' + v(j.jobcode) : ''}</div>
      <img class="pc-logo" src="/logo.png" alt="Supreme Art">
    </div>
    <h1 class="pc-title">JOB CARD</h1>
    <table class="pc-table">
      <tr>
        ${dateCell('Date', j.dateissued)}
        ${cell('Code', j.jobcode)}
        ${cell('P.O. Qty', j.qty)}
        ${cell('Machine Name', j.machine)}
        ${cell('Ups', j.ups)}
        ${cell('Job Priority', j.priority)}
      </tr>
      <tr>
        <td colspan="3"><div class="pc-label">Job Name</div><div class="pc-value">${v(j.name)}</div></td>
        <td colspan="2"><div class="pc-label">Size / GSM</div><div class="pc-value">${v(j.size)}</div></td>
        <td><div class="pc-label">Company</div><div class="pc-value">${v(j.client)}</div></td>
      </tr>
      <tr>
        <td colspan="3"><div class="pc-label">Cutting Size / GSM</div><div class="pc-value">${v(p.cutting_size_gsm)}</div></td>
        <td colspan="3"><div class="pc-label">Quantity of Packets</div><div class="pc-value">${v(p.quantity_of_packets)}</div></td>
      </tr>
      <tr>
        <td colspan="2"><div class="pc-label">P.O. No.</div><div class="pc-value">${v(j.ref)}</div></td>
        <td colspan="2"><div class="pc-label">Sheets Qty</div><div class="pc-value">${v(j.sheets)}</div></td>
        <td colspan="2"><div class="pc-label">Unit Carton Qty</div><div class="pc-value">${v(j.cartonqty)}</div></td>
      </tr>
      <tr>
        ${cell('B.No', j.bno)}
        <td colspan="2"><div class="pc-label">Mfg Date</div><div class="pc-value">${fmt(j.mfgdate)}</div></td>
        <td colspan="2"><div class="pc-label">Exp Date</div><div class="pc-value">${fmt(j.expdate)}</div></td>
        ${cell('MRP', j.mrp)}
      </tr>
      <tr>
        <td colspan="3"><div class="pc-label">Deadline</div><div class="pc-value">${fmt(j.deadline)}</div></td>
        <td colspan="3"><div class="pc-label">Delivered PO Qty</div><div class="pc-value">${v(j.delqty)}</div></td>
      </tr>
    </table>
    <table class="pp-table">
      ${specsRows}
    </table>
    <table class="pp-table">
      <tr>
        <th class="pp-row-label">Particulars</th>
        <th>Details</th>
        <th>Quantity</th>
        <th>Name</th>
        <th>Signature</th>
      </tr>
      ${partRows}
    </table>
    ${j.notes ? `<div style="margin-top:10px;font-size:9pt;"><b>Notes:</b> ${v(j.notes)}</div>` : ''}
    <div class="pc-sig">Signature: ____________________________</div>
    </div>
  `;
}

function printJobCard(id) {
  const j = jobs.find(x => x.id === id);
  if (!j) return;
  const area = document.getElementById('print-area');
  area.innerHTML = buildPrintCard(j);
  setTimeout(() => {
    window.print();
    setTimeout(() => { area.innerHTML = ''; }, 500);
  }, 50);
}

function exportCSV() {
  const header = ['Job ID','Job Code','Job Name','Client','Date Issued','Size/GSM','Ups','Sheets Qty','PO Qty','Type of Paper','Machine','Coatings','Priority','Ref/PO','Deadline','Delivered PO Qty','Unit Carton Qty','Current Stage','Status','Created'];
  const rows = jobs.map(j => {
    const coatings = Array.isArray(j.coatings) ? j.coatings.join('; ') : '';
    return [j.id, j.jobcode||'', j.name, j.client, j.dateissued||'', j.size||'', j.ups||'', j.sheets||'', j.qty||'', j.paper||'', j.machine||'', coatings, j.priority||'', j.ref||'', j.deadline||'', j.delqty||'', j.cartonqty||'', STAGES[j.stage_index||0]||'Delivered', isDone(j)?'Delivered':isBlocked(j)?'Blocked':'In Progress', j.created_at?new Date(j.created_at).toLocaleDateString('en-PK'):''];
  });
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  ws['!cols'] = header.map((h,i) => ({ wch: Math.max(h.length, ...rows.map(r => String(r[i]||'').length)) + 2 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Jobs');
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `supreme-art-jobs-${stamp}.xlsx`);
  notify('Exported!');
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadJobs(), loadInventory()]);
  document.getElementById('loading-screen').style.display = 'none';
  setInterval(() => { loadJobs(); loadInventory(); }, 30000);
}

init();
</script>
